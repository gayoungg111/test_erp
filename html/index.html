<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERP 분석 서비스</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.2/html2pdf.bundle.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      background: #f8fafc; color: #1e293b; line-height: 1.5; min-height: 100vh;
    }
    .layout { display: flex; min-height: 100vh; }
    .sidebar {
      position: fixed; left: 0; top: 0; width: 256px; height: 100vh;
      background: #1e40af; color: #fff; display: flex; flex-direction: column;
      box-shadow: 4px 0 24px rgba(0,0,0,.12); z-index: 100;
    }
    .sidebar-header { border-bottom: 1px solid #1d4ed8; padding: 24px; }
    .sidebar-header h1 { font-size: 1.25rem; font-weight: 700; }
    .sidebar-header p { margin-top: 4px; font-size: .75rem; color: #dbeafe; }
    .nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
    .nav-btn {
      display: flex; align-items: center; gap: 12px; width: 100%;
      padding: 12px 16px; border: none; border-radius: 8px; cursor: pointer;
      font-size: .875rem; font-weight: 500; text-align: left;
      background: transparent; color: #dbeafe; transition: .2s;
    }
    .nav-btn:hover { background: #1d4ed8; color: #fff; }
    .nav-btn.active { background: #fff; color: #1e40af; box-shadow: 0 4px 12px rgba(0,0,0,.15); }
    .nav-btn .icon { font-size: 1.125rem; }
    .sidebar-footer {
      border-top: 1px solid #1d4ed8; padding: 16px 24px;
      font-size: .75rem; color: #bfdbfe;
    }
    .main { margin-left: 256px; flex: 1; padding: 32px; }
    .page { display: none; }
    .page.active { display: block; }
    .page-title { font-size: 1.5rem; font-weight: 700; color: #1e293b; }
    .page-desc { margin-top: 4px; font-size: .875rem; color: #64748b; margin-bottom: 24px; }
    .card {
      background: #fff; border: 1px solid #e2e8f0; border-radius: 12px;
      padding: 24px; box-shadow: 0 1px 3px rgba(0,0,0,.06); margin-bottom: 24px;
    }
    .card h3 { font-size: 1.125rem; font-weight: 600; margin-bottom: 16px; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 8px; font-size: .875rem;
      font-weight: 500; cursor: pointer; border: none; transition: .2s;
    }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #1d4ed8; }
    .btn-secondary { background: #fff; color: #334155; border: 1px solid #cbd5e1; }
    .btn-secondary:hover:not(:disabled) { background: #f8fafc; }
    .toolbar { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; align-items: center; }
    .toolbar .spacer { flex: 1; }
    .hint {
      background: #f8fafc; border-radius: 8px; padding: 12px 16px;
      font-size: .75rem; color: #475569; margin-bottom: 12px;
    }
    .input-field {
      width: 100%; padding: 8px 12px; border: 1px solid #cbd5e1;
      border-radius: 8px; font-size: .875rem;
    }
    .input-field:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px #dbeafe; }
    table { width: 100%; border-collapse: collapse; font-size: .875rem; }
    th {
      background: #f8fafc; padding: 8px 12px; text-align: left;
      font-size: .75rem; font-weight: 600; text-transform: uppercase;
      color: #64748b; border-bottom: 1px solid #e2e8f0;
    }
    td { padding: 6px 8px; border-bottom: 1px solid #f1f5f9; }
    .alert {
      padding: 12px 16px; border-radius: 8px; font-size: .875rem; margin-bottom: 16px;
    }
    .alert-error { background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; }
    .alert-success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
    .alert-warn { background: #fffbeb; border: 1px solid #fde68a; color: #92400e; }
    .stat-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px; margin-bottom: 24px;
    }
    .stat-card {
      background: #fff; border: 1px solid #e2e8f0; border-radius: 12px;
      padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .stat-card .icon { font-size: 1.5rem; margin-bottom: 8px; }
    .stat-card .label { font-size: .75rem; color: #64748b; font-weight: 500; }
    .stat-card .value { font-size: 1.125rem; font-weight: 700; margin-top: 4px; }
    .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    @media (max-width: 1024px) { .chart-grid { grid-template-columns: 1fr; } }
    .chart-box { position: relative; height: 300px; }
    .empty-state {
      text-align: center; padding: 64px 24px;
    }
    .empty-state .emoji { font-size: 3rem; opacity: .4; margin-bottom: 16px; }
    .empty-state h3 { font-size: 1.125rem; font-weight: 600; color: #334155; }
    .empty-state p { margin-top: 8px; font-size: .875rem; color: #64748b; max-width: 400px; margin-inline: auto; }
    .empty-state .btn { margin-top: 24px; }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 999px;
      font-size: .75rem; font-weight: 500; background: #dbeafe; color: #1d4ed8;
    }
    .report-header { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 16px; align-items: flex-start; }
    .report-actions { display: flex; gap: 12px; align-items: center; }
    .download-menu { position: relative; }
    .download-menu-panel {
      position: absolute; right: 0; top: calc(100% + 8px); z-index: 20;
      width: 208px; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px;
      box-shadow: 0 10px 25px rgba(15,23,42,.1); overflow: hidden;
    }
    .download-menu-panel button {
      display: flex; width: 100%; justify-content: space-between; align-items: center;
      padding: 10px 16px; border: none; background: #fff; cursor: pointer;
      font-size: .875rem; color: #334155; text-align: left;
    }
    .download-menu-panel button:hover { background: #f8fafc; }
    .download-menu-panel button span:last-child { font-size: .75rem; color: #94a3b8; }
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200; display: none;
      align-items: center; justify-content: center; background: rgba(15,23,42,.5); padding: 16px;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      width: 100%; max-width: 420px; background: #fff; border-radius: 16px;
      border: 1px solid #e2e8f0; padding: 24px; box-shadow: 0 25px 50px rgba(15,23,42,.2);
    }
    .modal-box h3 { font-size: 1.125rem; font-weight: 700; color: #1e293b; }
    .modal-box .modal-desc { margin-top: 4px; font-size: .875rem; color: #64748b; }
    .modal-field { margin-top: 16px; }
    .modal-field label { display: block; margin-bottom: 6px; font-size: .875rem; font-weight: 500; color: #334155; }
    .modal-actions { display: flex; gap: 12px; margin-top: 20px; }
    .modal-actions .btn { flex: 1; justify-content: center; }
    .modal-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .modal-close { border: none; background: none; color: #94a3b8; font-size: 1.125rem; cursor: pointer; padding: 4px; border-radius: 8px; }
    .modal-close:hover { background: #f1f5f9; color: #475569; }
    .summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }
    .summary-item { background: #f8fafc; border-radius: 8px; padding: 12px 16px; }
    .summary-item .label { font-size: .75rem; color: #64748b; }
    .summary-item .value { font-weight: 600; margin-top: 4px; }
    .insight-box {
      background: #eff6ff; border-radius: 8px; padding: 16px 20px;
      font-size: .875rem; line-height: 1.7; color: #334155;
    }
    .insight-box p + p { margin-top: 8px; }
    .text-right { text-align: right; }
    .del-btn { background: none; border: none; color: #f87171; cursor: pointer; font-size: 1rem; }
    .del-btn:hover { color: #dc2626; }
    .tag-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .tag { padding: 6px 12px; border-radius: 8px; font-size: .875rem; font-weight: 500; }
    .tag-blue { background: #eff6ff; color: #1d4ed8; }
    .tag-purple { background: #f5f3ff; color: #6d28d9; }
    .error-list, .warn-list { max-height: 160px; overflow-y: auto; border-radius: 8px; }
    .error-list { border: 1px solid #fecaca; background: #fef2f2; }
    .warn-list { border: 1px solid #fde68a; background: #fffbeb; }
    .error-list div, .warn-list div {
      padding: 8px 16px; font-size: .75rem; border-bottom: 1px solid rgba(0,0,0,.05);
    }
    .table-scroll { overflow-x: auto; }
    .drop-zone {
      border: 2px dashed #cbd5e1; border-radius: 12px; padding: 40px 24px;
      text-align: center; background: #f8fafc; cursor: pointer; transition: .2s; margin-bottom: 16px;
    }
    .drop-zone:hover, .drop-zone.dragging {
      border-color: #3b82f6; background: #eff6ff;
    }
    .drop-zone .icon { font-size: 2.5rem; opacity: .5; }
    .file-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .file-tag {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 12px; border-radius: 999px; background: #eff6ff;
      color: #1d4ed8; font-size: .75rem; font-weight: 500;
    }
    .gemini-badge { display:inline-block;padding:2px 10px;border-radius:999px;background:#ede9fe;color:#6d28d9;font-size:.75rem;font-weight:500; }
    .api-key-row { display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap; }
    .api-key-row input { flex:1;min-width:200px; }
    .gemini-content pre { white-space:pre-wrap;font-family:inherit;font-size:.875rem;line-height:1.7;color:#334155; }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>ERP 분석 서비스</h1>
        <p>데이터 검증 · 대시보드 · 보고서</p>
      </div>
      <nav class="nav">
        <button class="nav-btn active" data-page="input"><span class="icon">📥</span>데이터 입력</button>
        <button class="nav-btn" data-page="dashboard"><span class="icon">📊</span>대시보드</button>
        <button class="nav-btn" data-page="report"><span class="icon">📄</span>분석보고서</button>
        <button class="nav-btn" data-page="data"><span class="icon">🗂️</span>원본데이터</button>
      </nav>
      <div class="sidebar-footer">ERP Analyzer v1.0 · HTML</div>
    </aside>

    <main class="main">
      <!-- 데이터 입력 -->
      <section id="page-input" class="page active">
        <h2 class="page-title">데이터 입력</h2>
        <p class="page-desc">CSV/Excel 파일을 업로드하면 대시보드·분석보고서·원본데이터가 자동으로 채워집니다.</p>
        <div class="card">
          <div id="drop-zone" class="drop-zone">
            <input type="file" id="file-upload" accept=".csv,.xlsx,.xls" multiple hidden />
            <div class="icon">📂</div>
            <p style="margin-top:12px;font-size:.875rem;font-weight:500;color:#334155">파일을 끌어다 놓거나 클릭하여 선택</p>
            <p style="margin-top:4px;font-size:.75rem;color:#64748b">CSV / Excel · 여러 개 동시 업로드 가능</p>
            <div id="file-tags" class="file-tags"></div>
          </div>
          <div class="toolbar">
            <button class="btn btn-secondary" id="btn-sample">샘플 데이터 불러오기</button>
          </div>
          <div class="hint"><strong>필수 컬럼:</strong> 날짜, 부서, 항목, 금액, 수량 · 선택: 거래처, 비고</div>
        </div>
        <div id="input-error"></div>
        <div id="validation-result"></div>
      </section>

      <!-- 대시보드 -->
      <section id="page-dashboard" class="page">
        <div id="dashboard-content"></div>
      </section>

      <!-- 분석보고서 -->
      <section id="page-report" class="page">
        <div id="report-content"></div>
      </section>

      <!-- 원본데이터 -->
      <section id="page-data" class="page">
        <div id="data-content"></div>
      </section>
    </main>
  </div>

  <div id="download-modal" class="modal-overlay" onclick="closeDownloadModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div>
          <h3>보고서 받아보기</h3>
          <p class="modal-desc" id="download-modal-format">파일 형식</p>
        </div>
        <button type="button" class="modal-close" onclick="closeDownloadModal()" aria-label="닫기">✕</button>
      </div>
      <form id="download-modal-form" onsubmit="submitDownloadModal(event)">
        <div class="modal-field">
          <label for="download-email">이메일</label>
          <input id="download-email" type="email" class="input-field" placeholder="example@email.com" required />
        </div>
        <div class="modal-field">
          <label for="download-nickname">닉네임</label>
          <input id="download-nickname" type="text" class="input-field" placeholder="닉네임을 입력하세요" maxlength="50" required />
        </div>
        <div id="download-modal-error"></div>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeDownloadModal()">취소</button>
          <button type="submit" class="btn btn-primary" id="download-modal-submit">받아보기</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const FORMAT_LABELS = { word: "Word (.doc)", excel: "Excel (.xlsx)", pdf: "PDF (.pdf)" };
    let pendingDownloadFormat = null;

    function validateDownloadForm(email, nickname) {
      const trimmedEmail = (email || "").trim();
      const trimmedNickname = (nickname || "").trim();
      if (!trimmedNickname) return "닉네임을 입력해주세요.";
      if (trimmedNickname.length > 50) return "닉네임은 50자 이내로 입력해주세요.";
      if (!trimmedEmail) return "이메일을 입력해주세요.";
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(trimmedEmail)) return "올바른 이메일 형식을 입력해주세요.";
      return null;
    }

    async function saveDownloadRequestToSupabase(payload) {
      const res = await fetch("/api/download/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          email: payload.email,
          nickname: payload.nickname,
          format: payload.format,
          recordCount: payload.recordCount ?? null,
        }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.detail || "다운로드 요청 저장에 실패했습니다.");
      }
    }

    function openDownloadModal(format) {
      const panel = document.getElementById("download-menu-panel");
      if (panel) panel.style.display = "none";
      pendingDownloadFormat = format;
      document.getElementById("download-modal-format").textContent = (FORMAT_LABELS[format] || format) + " 형식으로 다운로드합니다.";
      document.getElementById("download-modal-error").innerHTML = "";
      document.getElementById("download-modal").classList.add("open");
    }

    function closeDownloadModal() {
      pendingDownloadFormat = null;
      document.getElementById("download-modal").classList.remove("open");
      document.getElementById("download-modal-form").reset();
      document.getElementById("download-modal-error").innerHTML = "";
    }

    async function submitDownloadModal(e) {
      e.preventDefault();
      if (!pendingDownloadFormat) return;
      const email = document.getElementById("download-email").value;
      const nickname = document.getElementById("download-nickname").value;
      const errEl = document.getElementById("download-modal-error");
      const submitBtn = document.getElementById("download-modal-submit");
      const validationError = validateDownloadForm(email, nickname);
      if (validationError) {
        errEl.innerHTML = `<div class="alert alert-error" style="margin-top:12px">${validationError}</div>`;
        return;
      }
      submitBtn.disabled = true;
      submitBtn.textContent = "처리 중...";
      errEl.innerHTML = "";
      try {
        await saveDownloadRequestToSupabase({
          email: email.trim(),
          nickname: nickname.trim(),
          format: pendingDownloadFormat,
          recordCount: state.data?.length || 0,
        });
        const format = pendingDownloadFormat;
        closeDownloadModal();
        executeDownload(format);
      } catch (err) {
        errEl.innerHTML = `<div class="alert alert-error" style="margin-top:12px">${err.message || "요청 처리에 실패했습니다."}</div>`;
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "받아보기";
      }
    }

    function executeDownload(format) {
      if (format === "word") downloadReportWord();
      else if (format === "excel") downloadReportExcel();
      else downloadReportPdf();
    }
    const REQUIRED = ["날짜", "부서", "항목", "금액", "수량"];
    const SAMPLE = [
      { 날짜: "2025-01-05", 부서: "영업", 항목: "제품A", 금액: 1500000, 수량: 10, 거래처: "ABC상사", 비고: "" },
      { 날짜: "2025-01-12", 부서: "영업", 항목: "제품B", 금액: 2300000, 수량: 15, 거래처: "XYZ코퍼", 비고: "" },
      { 날짜: "2025-02-03", 부서: "구매", 항목: "원자재", 금액: 890000, 수량: 50, 거래처: "공급업체A", 비고: "긴급발주" },
      { 날짜: "2025-02-18", 부서: "생산", 항목: "제품A", 금액: 1200000, 수량: 8, 거래처: "", 비고: "내부생산" },
      { 날짜: "2025-03-07", 부서: "영업", 항목: "제품C", 금액: 3100000, 수량: 20, 거래처: "DEF유통", 비고: "" },
      { 날짜: "2025-03-22", 부서: "재무", 항목: "운영비", 금액: 450000, 수량: 1, 거래처: "", 비고: "사무용품" },
      { 날짜: "2025-04-01", 부서: "영업", 항목: "제품A", 금액: 1800000, 수량: 12, 거래처: "ABC상사", 비고: "" },
      { 날짜: "2025-04-15", 부서: "구매", 항목: "포장재", 금액: 320000, 수량: 100, 거래처: "포장업체B", 비고: "" },
      { 날짜: "2025-05-10", 부서: "생산", 항목: "제품B", 금액: 950000, 수량: 6, 거래처: "", 비고: "" },
      { 날짜: "2025-05-28", 부서: "영업", 항목: "제품C", 금액: 2700000, 수량: 18, 거래처: "GHI마트", 비고: "대량주문" },
    ];

    const state = { data: [], summary: {}, validation: null, isValidated: false, charts: {}, geminiReport: null, uploadedFiles: [] };
    const COLORS = ["#2563eb", "#7c3aed", "#059669", "#d97706", "#dc2626", "#0891b2"];

    function fmt(n) { return Number(n || 0).toLocaleString(); }

    function normalizeKey(key) { return key.trim().replace(/^\ufeff/, ""); }

    function normalizeRow(raw) {
      const row = {};
      for (const [k, v] of Object.entries(raw)) row[normalizeKey(k)] = v;
      return row;
    }

    function excelSerialToDate(serial) {
      return new Date((serial - 25569) * 86400 * 1000);
    }

    function parseDate(v) {
      if (v === null || v === undefined || v === "") return null;
      if (v instanceof Date && !isNaN(v.getTime())) return v;
      if (typeof v === "number" && v > 30000 && v < 60000) {
        const d = excelSerialToDate(v);
        if (!isNaN(d.getTime())) return d;
      }
      const str = String(v).trim();
      if (!str) return null;
      const normalized = str.replace(/\./g, "-").replace(/\//g, "-");
      const d = new Date(normalized);
      return isNaN(d.getTime()) ? null : d;
    }

    function parseNumber(v) {
      if (typeof v === "number" && !isNaN(v)) return v;
      const str = String(v ?? "").replace(/,/g, "").replace(/원/g, "").replace(/\s/g, "").trim();
      if (!str) return NaN;
      return Number(str);
    }

    function formatDateLocal(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    function isBlankRow(row) {
      const emptyNum = (v) => v === undefined || v === null || (typeof v === "number" && isNaN(v));
      return !String(row.날짜 ?? "").trim() && !String(row.부서 ?? "").trim() &&
        !String(row.항목 ?? "").trim() && emptyNum(row.금액) && emptyNum(row.수량);
    }

    const FIELD_ALIASES = {
      날짜: ["날짜","date","order_date","join_date","일자"],
      부서: ["부서","department","channel","category","customer_type"],
      항목: ["항목","item","product_name","product","product_id","name"],
      금액: ["금액","amount","amount_krw","total_amount_krw","unit_price_krw","price"],
      수량: ["수량","qty","quantity","stock_qty","count"],
      거래처: ["거래처","customer","customer_name","customer_id"],
      비고: ["비고","status","note","remarks"],
    };

    function getField(row, field) {
      if (row[field] !== undefined && row[field] !== "") return row[field];
      const lower = Object.fromEntries(Object.entries(row).map(([k,v]) => [k.toLowerCase(), v]));
      for (const alias of (FIELD_ALIASES[field] || [field])) {
        const val = lower[alias.toLowerCase()];
        if (val !== undefined && val !== "") return val;
      }
      return undefined;
    }

    function detectFileType(rows) {
      if (!rows.length) return "generic";
      const keys = new Set(Object.keys(normalizeRow(rows[0])).map(k => k.toLowerCase()));
      if (keys.has("order_no") && keys.has("order_date")) return "sales_orders";
      if (keys.has("order_no") && keys.has("product_id") && keys.has("qty")) return "sales_order_items";
      if (keys.has("product_id") && keys.has("product_name")) return "products";
      if (keys.has("customer_id") && keys.has("customer_name")) return "customers";
      return "generic";
    }

    function mergeSalesErp(parsedFiles) {
      const byType = (t) => (parsedFiles.find(f => detectFileType(f.rows) === t)?.rows || []).map(normalizeRow);
      const orders = byType("sales_orders"), items = byType("sales_order_items");
      const products = byType("products"), customers = byType("customers");
      const orderMap = new Map(orders.map(r => [String(r.order_no), r]));
      const productMap = new Map(products.map(r => [String(r.product_id), r]));
      const customerMap = new Map(customers.map(r => [String(r.customer_id), r]));
      const records = [];
      if (items.length) {
        for (const item of items) {
          const order = orderMap.get(String(item.order_no));
          const product = productMap.get(String(item.product_id));
          const customer = order ? customerMap.get(String(order.customer_id)) : undefined;
          const d = parseDate(order?.order_date);
          if (!d) continue;
          records.push({
            날짜: formatDateLocal(d),
            부서: String(order?.channel || product?.category || "미분류"),
            항목: String(product?.product_name || item.product_id || "품목"),
            금액: parseNumber(item.amount_krw ?? item.unit_price_krw),
            수량: parseNumber(item.qty),
            거래처: String(customer?.customer_name || order?.customer_id || ""),
            비고: String(order?.status || ""),
          });
        }
      } else if (orders.length) {
        for (const order of orders) {
          const customer = customerMap.get(String(order.customer_id));
          const d = parseDate(order.order_date);
          if (!d) continue;
          records.push({
            날짜: formatDateLocal(d), 부서: String(order.channel || "미분류"),
            항목: `주문 ${order.order_no}`, 금액: parseNumber(order.total_amount_krw), 수량: 1,
            거래처: String(customer?.customer_name || ""), 비고: String(order.status || ""),
          });
        }
      }
      return records;
    }

    function mapRawToRecord(raw) {
      const row = normalizeRow(raw);
      const dateRaw = getField(row, "날짜");
      let 날짜 = "";
      if (dateRaw instanceof Date) 날짜 = formatDateLocal(dateRaw);
      else if (dateRaw != null && dateRaw !== "") {
        const d = parseDate(dateRaw);
        날짜 = d ? formatDateLocal(d) : String(dateRaw);
      }
      return {
        날짜,
        부서: String(getField(row, "부서") ?? "").trim(),
        항목: String(getField(row, "항목") ?? "").trim(),
        금액: parseNumber(getField(row, "금액")),
        수량: parseNumber(getField(row, "수량")),
        거래처: getField(row, "거래처") != null ? String(getField(row, "거래처")).trim() : "",
        비고: getField(row, "비고") != null ? String(getField(row, "비고")).trim() : "",
      };
    }

    function validateErpData(records) {
      const errors = [], warnings = [], validRows = [];
      const dataRows = records.filter(r => !isBlankRow(r));
      if (!dataRows.length) {
        return { valid: false, errors: [{ row: 0, field: "전체", message: "데이터가 비어 있습니다." }], warnings: [], summary: {}, data: [] };
      }
      dataRows.forEach((row, idx) => {
        const rowNum = idx + 1;
        const rowErrors = [];
        const dateVal = parseDate(row.날짜);
        if (!dateVal) rowErrors.push(`날짜 형식이 올바르지 않습니다. (값: ${row.날짜 || "비어있음"})`);
        if (!row.부서 || String(row.부서).trim() === "") rowErrors.push("부서는 필수입니다.");
        if (!row.항목 || String(row.항목).trim() === "") rowErrors.push("항목은 필수입니다.");
        const amount = typeof row.금액 === "number" ? row.금액 : parseNumber(row.금액);
        if (isNaN(amount)) rowErrors.push(`금액은 숫자여야 합니다. (값: ${row.금액})`);
        else if (amount < 0) warnings.push({ row: rowNum, field: "금액", message: "금액이 음수입니다." });
        const qty = typeof row.수량 === "number" ? row.수량 : parseNumber(row.수량);
        if (isNaN(qty)) rowErrors.push(`수량은 숫자여야 합니다. (값: ${row.수량})`);
        else if (qty < 0) warnings.push({ row: rowNum, field: "수량", message: "수량이 음수입니다." });
        if (rowErrors.length) rowErrors.forEach(m => errors.push({ row: rowNum, field: "검증", message: m }));
        else {
          validRows.push({
            날짜: formatDateLocal(dateVal),
            부서: String(row.부서).trim(),
            항목: String(row.항목).trim(),
            금액: amount, 수량: qty,
            거래처: row.거래처 ? String(row.거래처).trim() : "",
            비고: row.비고 ? String(row.비고).trim() : "",
          });
        }
      });
      const summary = validRows.length ? computeSummary(validRows) : {};
      return { valid: errors.length === 0 && validRows.length > 0, errors, warnings, summary, data: validRows };
    }

    function computeSummary(data) {
      const totalAmount = data.reduce((s, r) => s + r.금액, 0);
      const totalQty = data.reduce((s, r) => s + r.수량, 0);
      const dates = data.map(r => r.날짜).sort();
      const depts = {};
      data.forEach(r => {
        if (!depts[r.부서]) depts[r.부서] = { 부서: r.부서, 총금액: 0, 총수량: 0, 건수: 0 };
        depts[r.부서].총금액 += r.금액; depts[r.부서].총수량 += r.수량; depts[r.부서].건수++;
      });
      const items = {};
      data.forEach(r => {
        if (!items[r.항목]) items[r.항목] = { 항목: r.항목, 총금액: 0, 총수량: 0 };
        items[r.항목].총금액 += r.금액; items[r.항목].총수량 += r.수량;
      });
      const months = {};
      data.forEach(r => {
        const m = r.날짜.slice(0, 7);
        if (!months[m]) months[m] = { 월: m, 총금액: 0, 건수: 0 };
        months[m].총금액 += r.금액; months[m].건수++;
      });
      return {
        totalRecords: data.length,
        totalAmount, totalQuantity: totalQty,
        avgAmount: totalAmount / data.length,
        departmentCount: new Set(data.map(r => r.부서)).size,
        itemCount: new Set(data.map(r => r.항목)).size,
        dateRange: { start: dates[0], end: dates[dates.length - 1] },
        byDepartment: Object.values(depts).sort((a, b) => b.총금액 - a.총금액),
        byItem: Object.values(items).sort((a, b) => b.총금액 - a.총금액).slice(0, 10),
        byMonth: Object.values(months).sort((a, b) => a.월.localeCompare(b.월)),
      };
    }

      state.validation = result;
      state.isValidated = result.valid;

      if (result.valid) { state.data = result.data; state.summary = result.summary; }

      let html = `<div class="card"><h3>검증 결과</h3>`;

      html += result.valid

        : `❌ 검증 실패 — ${result.errors.length}개의 오류가 발견되었습니다.`;
      html += `</div>`;
      if (result.errors.length) {
        html += `<h4 style="font-size:.875rem;color:#b91c1c;margin-bottom:8px">오류 목록</h4><div class="error-list">`;
        result.errors.forEach(e => html += `<div>행 ${e.row}: ${e.message}</div>`);

      if (result.warnings.length) {
        html += `<h4 style="font-size:.875rem;color:#92400e;margin:12px 0 8px">경고</h4><div class="warn-list">`;
        result.warnings.forEach(w => html += `<div>행 ${w.row} (${w.field}): ${w.message}</div>`);
        html += `</div>`;

      el.innerHTML = html;
    }

      if (months.length >= 2) {
        const last = months[months.length - 1].총금액, prev = months[months.length - 2].총금액;
        if (prev > 0) {
          const ch = ((last - prev) / prev) * 100;
          lines.push(`최근 월별 추이를 보면 전월 대비 ${Math.abs(ch).toFixed(1)}% ${ch >= 0 ? "증가" : "감소"}하였습니다.`);

      const topItem = s.byItem?.[0];
      if (topItem) lines.push(`항목별로는 '${topItem.항목}'이(가) ${fmt(topItem.총금액)}원으로 최다 매출 항목입니다.`);
      return lines;
    }

    }

    async function generateGeminiReport() {
      const errEl = document.getElementById("report-error");
      const btn = document.getElementById("btn-gemini");
      if (errEl) errEl.innerHTML = "";
      if (btn) { btn.disabled = true; btn.textContent = "Gemini 생성 중..."; }

      try {
        let report = null;
        try {
          const res = await fetch("/api/report/gemini", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ data: state.data, summary: state.summary }),
          });
          if (res.ok) {
            const json = await res.json();
            report = json.report;
          }
        } catch (_) { /* backend unavailable */ }

        if (!report) {
          const apiKey = document.getElementById("gemini-api-key")?.value || localStorage.getItem("gemini_api_key");
          if (!apiKey) throw new Error("Gemini API Key를 입력하거나 백엔드 서버를 실행해주세요.");
          const model = "gemini-2.5-flash-lite";
          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              contents: [{ parts: [{ text: buildGeminiPrompt() }] }],
              generationConfig: { temperature: 0.4, maxOutputTokens: 8192 },
            }),
          });
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error?.message || "Gemini API 호출 실패");
          }
          const json = await res.json();
          report = json.candidates?.[0]?.content?.parts?.[0]?.text;
          if (!report) throw new Error("Gemini가 빈 응답을 반환했습니다.");
        }

        state.geminiReport = report;
        renderReport();
      } catch (e) {
        if (errEl) errEl.innerHTML = `<div class="alert alert-error">${e.message || "Gemini 보고서 생성 실패"}</div>`;
      } finally {
        if (btn) { btn.disabled = false; btn.textContent = "✨ Gemini 보고서 생성"; }
      }
    }

    function toggleDownloadMenu(e) {
      e.stopPropagation();
      const panel = document.getElementById("download-menu-panel");
      if (!panel) return;
      panel.style.display = panel.style.display === "none" ? "block" : "none";
    }

    document.addEventListener("click", () => {
      const panel = document.getElementById("download-menu-panel");
      if (panel) panel.style.display = "none";
    });

    function buildReportExportHtml() {
      const s = state.summary;
      const insights = generateInsights();
      const summaryRows = [
        ["총 거래 건수", fmt(s.totalRecords) + "건"],
        ["총 금액", fmt(s.totalAmount) + "원"],
        ["총 수량", fmt(s.totalQuantity)],
        ["평균 거래금액", fmt(Math.round(s.avgAmount || 0)) + "원"],
        ["부서 수", (s.departmentCount || 0) + "개"],
        ["항목 수", (s.itemCount || 0) + "개"],
        ["분석 기간", s.dateRange ? s.dateRange.start + " ~ " + s.dateRange.end : "-"],
      ].map(([label, value]) => `<tr><td style="padding:8px 12px;border:1px solid #e2e8f0;background:#f8fafc;font-weight:600">${label}</td><td style="padding:8px 12px;border:1px solid #e2e8f0">${value}</td></tr>`).join("");

      const geminiHtml = state.geminiReport
        ? `<div>${state.geminiReport.split("\n").map(line => {
            if (line.startsWith("## ")) return `<h3>${escHtml(line.slice(3))}</h3>`;
            if (line.startsWith("# ")) return `<h2>${escHtml(line.slice(2))}</h2>`;
            if (line.startsWith("- ")) return `<li>${escHtml(line.slice(2))}</li>`;
            if (!line.trim()) return "<br/>";
            return `<p>${escHtml(line)}</p>`;
          }).join("")}</div>`
        : `<p style="color:#64748b;font-size:13px">AI 종합 보고서는 생성되지 않았습니다.</p>`;

      return `
        <h1 style="text-align:center;margin-bottom:8px">ERP 분석 보고서</h1>
        <p style="text-align:center;color:#64748b;font-size:13px;margin-bottom:24px">생성일: ${new Date().toLocaleString("ko-KR")}</p>
        <h2 style="font-size:18px">1. 요약</h2>
        <table style="width:100%;border-collapse:collapse;margin-bottom:24px;font-size:14px">${summaryRows}</table>
        <h2 style="font-size:18px">2. 부서별 분석</h2>
        ${deptTable(s.byDepartment).replace('class="table-scroll"', 'style="margin-bottom:24px"')}
        <h2 style="font-size:18px">3. 항목별 Top 10</h2>
        ${itemTable(s.byItem).replace('class="table-scroll"', 'style="margin-bottom:24px"')}
        <h2 style="font-size:18px">4. 월별 추이</h2>
        ${monthTable(s.byMonth).replace('class="table-scroll"', 'style="margin-bottom:24px"')}
        <h2 style="font-size:18px">5. 기본 분석 의견</h2>
        <div style="background:#eff6ff;padding:16px;border-radius:8px;margin-bottom:24px">${insights.map(l => `<p style="margin:0 0 8px">${escHtml(l)}</p>`).join("")}</div>
        <h2 style="font-size:18px">6. AI 종합 보고서</h2>
        ${geminiHtml}
      `;
    }

    function downloadReport(format) {
      openDownloadModal(format);
    }

    function downloadReportPdf() {
      const container = document.createElement("div");
      container.style.cssText = "font-family:'Malgun Gothic',sans-serif;padding:40px;max-width:800px;line-height:1.7;color:#1e293b";
      container.innerHTML = buildReportExportHtml();
      document.body.appendChild(container);
      html2pdf().set({ margin: 10, filename: "erp_report.pdf", html2canvas: { scale: 2 }, jsPDF: { unit: "mm", format: "a4" } })
        .from(container).save().then(() => document.body.removeChild(container));
    }

    function downloadReportWord() {
      const html = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word'><head><meta charset='utf-8'></head><body style="font-family:'Malgun Gothic',sans-serif;line-height:1.6">${buildReportExportHtml()}</body></html>`;
      const blob = new Blob(["\ufeff" + html], { type: "application/msword" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "erp_report.doc";
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function downloadReportExcel() {
      const s = state.summary;
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
        ["항목", "값"],
        ["총 거래 건수", s.totalRecords],
        ["총 금액", s.totalAmount],
        ["총 수량", s.totalQuantity],
        ["평균 거래금액", Math.round(s.avgAmount || 0)],
        ["부서 수", s.departmentCount],
        ["항목 수", s.itemCount],
        ["분석 기간", s.dateRange ? s.dateRange.start + " ~ " + s.dateRange.end : "-"],
      ]), "요약");
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
        ["부서", "총금액", "총수량", "건수"],
        ...(s.byDepartment || []).map(r => [r.부서, r.총금액, r.총수량, r.건수]),
      ]), "부서별");
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
        ["항목", "총금액", "총수량"],
        ...(s.byItem || []).map(r => [r.항목, r.총금액, r.총수량]),
      ]), "항목별");
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
        ["월", "총금액", "건수"],
        ...(s.byMonth || []).map(r => [r.월, r.총금액, r.건수]),
      ]), "월별");
      XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
        ["기본 분석 의견"],
        ...generateInsights().map(line => [line]),
      ]), "분석의견");
      if (state.geminiReport) {
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([
          ["AI 종합 보고서"],
          ...state.geminiReport.split("\n").map(line => [line]),
        ]), "AI보고서");
      }
      XLSX.writeFile(wb, "erp_report.xlsx");
    }

    function downloadGeminiPdf() {
      downloadReportPdf();
    }

    function downloadGeminiWord() {
      downloadReportWord();
    }

    function summaryItem(label, value) {
      return `<div class="summary-item"><div class="label">${label}</div><div class="value">${value}</div></div>`;
    }

    function deptTable(rows) {
      if (!rows?.length) return "<p>데이터 없음</p>";
      return `<div class="table-scroll"><table><thead><tr><th>부서</th><th class="text-right">총금액</th><th class="text-right">총수량</th><th class="text-right">건수</th></tr></thead><tbody>
        ${rows.map(r => `<tr><td>${r.부서}</td><td class="text-right">${fmt(r.총금액)}원</td><td class="text-right">${fmt(r.총수량)}</td><td class="text-right">${r.건수}</td></tr>`).join("")}
      </tbody></table></div>`;
    }

    function itemTable(rows) {
      if (!rows?.length) return "<p>데이터 없음</p>";
      return `<div class="table-scroll"><table><thead><tr><th>항목</th><th class="text-right">총금액</th><th class="text-right">총수량</th></tr></thead><tbody>
        ${rows.map(r => `<tr><td>${r.항목}</td><td class="text-right">${fmt(r.총금액)}원</td><td class="text-right">${fmt(r.총수량)}</td></tr>`).join("")}
      </tbody></table></div>`;

    function monthTable(rows) {

      return `<div class="table-scroll"><table><thead><tr><th>월</th><th class="text-right">총금액</th><th class="text-right">건수</th></tr></thead><tbody>
        ${rows.map(r => `<tr><td>${r.월}</td><td class="text-right">${fmt(r.총금액)}원</td><td class="text-right">${r.건수}</td></tr>`).join("")}
      </tbody></table></div>`;

    function renderOriginalData() {
      const el = document.getElementById("data-content");
      if (!state.isValidated || !state.data.length) {
        el.innerHTML = emptyState();
        return;
      }
      const totalAmount = state.data.reduce((s, r) => s + r.금액, 0);
      const totalQty = state.data.reduce((s, r) => s + r.수량, 0);
      el.innerHTML = `
        <div class="report-header">
          <div>
            <h2 class="page-title">원본데이터</h2>
            <p class="page-desc">검증을 통과한 ERP 원본 데이터 ${state.data.length}건을 확인할 수 있습니다.</p>
          </div>
          <div class="tag-row">
            <span class="tag tag-blue">총 금액: ${fmt(totalAmount)}원</span>
            <span class="tag tag-purple">총 수량: ${fmt(totalQty)}</span>
          </div>
        </div>
        <div class="card table-scroll" style="padding:0">
          <table><thead><tr>

              <td class="text-right">${fmt(r.수량)}</td>

              <td style="color:#64748b">${r.비고 || "-"}</td>

    function goPage(name) {
      document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
      document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
      document.getElementById("page-" + name).classList.add("active");
      document.querySelector(`.nav-btn[data-page="${name}"]`).classList.add("active");
      if (name === "dashboard") renderDashboard();
      if (name === "report") renderReport();
      if (name === "data") renderOriginalData();
    }

    function isAllowedFile(name) {
      const lower = name.toLowerCase();
      return [".csv", ".xlsx", ".xls"].some(ext => lower.endsWith(ext));
    }

    function renderFileTags() {
      const el = document.getElementById("file-tags");
      if (!el) return;
      el.innerHTML = state.uploadedFiles.map(name =>
        `<span class="file-tag">📄 ${name}</span>`
      ).join("");
    }

    function parseRawFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            let wb;
            if (file.name.toLowerCase().endsWith(".csv")) wb = XLSX.read(e.target.result, { type: "string" });
            else wb = XLSX.read(e.target.result, { type: "array", cellDates: true });
            resolve(XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: "" }));
          } catch (err) { reject(err); }
        };
        reader.onerror = reject;
        if (file.name.toLowerCase().endsWith(".csv")) reader.readAsText(file, "UTF-8");
        else reader.readAsArrayBuffer(file);
      });
    }

    async function parseFiles(files) {
      const valid = Array.from(files).filter(f => isAllowedFile(f.name));
      if (!valid.length) throw new Error("CSV 또는 Excel 파일만 업로드 가능합니다.");
      const parsed = [];
      for (const file of valid) parsed.push({ name: file.name, rows: await parseRawFile(file) });
      const hasSales = parsed.some(p => ["sales_orders","sales_order_items"].includes(detectFileType(p.rows)));
      let records = hasSales ? mergeSalesErp(parsed) : [];
      if (!records.length) {
        for (const { rows } of parsed) records.push(...rows.map(mapRawToRecord).filter(r => !isBlankRow(r)));
      }
      if (!records.length) throw new Error("분석 가능한 데이터를 찾지 못했습니다.");
      return { records, fileNames: valid.map(f => f.name) };
    }

    async function handleFilesUpload(files) {
      document.getElementById("input-error").innerHTML = "";
      try {
        const { records, fileNames } = await parseFiles(files);
        state.uploadedFiles = fileNames;
        renderFileTags();
        showValidation(validateErpData(records));
      } catch (e) {
        document.getElementById("input-error").innerHTML =
          `<div class="alert alert-error">${e.message || "파일 파싱 오류가 발생했습니다."}</div>`;
      }
    }

    document.querySelectorAll(".nav-btn").forEach(btn => {
      btn.addEventListener("click", () => goPage(btn.dataset.page));
    });

    document.getElementById("btn-sample").addEventListener("click", () => {
      state.uploadedFiles = ["샘플 데이터"];
      renderFileTags();
      showValidation(validateErpData(SAMPLE));
    });

    const dropZone = document.getElementById("drop-zone");
    const fileInput = document.getElementById("file-upload");

    dropZone.addEventListener("click", () => fileInput.click());

    dropZone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropZone.classList.add("dragging");
    });

    dropZone.addEventListener("dragleave", (e) => {
      e.preventDefault();
      dropZone.classList.remove("dragging");
    });

    dropZone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropZone.classList.remove("dragging");
      if (e.dataTransfer.files.length) handleFilesUpload(e.dataTransfer.files);
    });

    fileInput.addEventListener("change", (e) => {
      if (e.target.files?.length) handleFilesUpload(e.target.files);
      e.target.value = "";
    });
  </script>
